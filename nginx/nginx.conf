events {
  worker_connections 1024;
}

http {
  upstream users_service {
    server users-service:3001;
  }

  upstream products_service {
    server products-service:3002;
  }

  server {
    listen 80;

    # Health check del gateway
    location /health {
      return 200 '{"service":"nginx-gateway","status":"ok"}';
      add_header Content-Type application/json;
    }

    # Rutas del users-service
    location /api/users/ {
      proxy_pass http://users_service/api/users/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Rutas del products-service
    location /api/products/ {
      proxy_pass http://products_service/api/products/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Rutas de health de cada servicio
    location /services/users/health {
      proxy_pass http://users_service/health;
    }

    location /services/products/health {
      proxy_pass http://products_service/health;
    }
  }
}
