version: "3.8"

services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - users-service
      - products-service
    networks:
      - microservices-net

  users-service:
    build: ./services/users-service
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/users
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - microservices-net

  products-service:
    build: ./services/products-service
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/products
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - microservices-net

  mongodb:
    image: mongo:7-jammy
    volumes:
      - mongodb_data:/data/db
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  microservices-net:
    driver: bridge

volumes:
  mongodb_data:
