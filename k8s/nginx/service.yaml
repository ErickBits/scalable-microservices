apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: microservices
  annotations:
    # AWS crea un Load Balancer externo automáticamente con este tipo
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: nginx-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  # LoadBalancer: expone el servicio al exterior con una IP pública de AWS
  type: LoadBalancer
